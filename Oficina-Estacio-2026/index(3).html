<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Minhoca vs Bombas</title>
    <style>
        body {
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            height: 100vh;
            margin: 0;
            background-color: #2c3e50;
            color: white;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        }
        canvas {
            border: 5px solid #ecf0f1;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
            background-color: #000;
        }
        .info {
            margin-bottom: 10px;
            text-align: center;
        }
        h1 { margin: 10px; color: #f1c40f; }
    </style>
</head>
<body>

    <div class="info">
        <h1>Minhoca Explosiva 💣</h1>
        <p>Use as setas do teclado para guiar a minhoca.</p>
        <div id="score">Bombas comidas: 0 | Tamanho: 100%</div>
    </div>
    
    <canvas id="gameCanvas" width="400" height="400"></canvas>

    <script>
        const canvas = document.getElementById("gameCanvas");
        const ctx = canvas.getContext("2d");
        const scoreElement = document.getElementById("score");

        const gridSize = 20;
        const tileCount = canvas.width / gridSize;

        let score = 0;
        let scale = 1.0;
        
        let dx = 0;
        let dy = 0;

        let snake = [
            {x: 10, y: 10},
            {x: 10, y: 11},
            {x: 10, y: 12}
        ];

        let bomb = {x: 5, y: 5};

        // Controle do teclado
        document.addEventListener("keydown", changeDirection);

        function main() {
            if (didGameEnd()) {
                alert("Game Over! Você comeu " + score + " bombas.");
                location.reload();
                return;
            }

            setTimeout(function onTick() {
                clearCanvas();
                drawBomb();
                advanceSnake();
                drawSnake();
                main();
            }, 100);
        }

        function clearCanvas() {
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);
        }

        function drawSnake() {
            snake.forEach((part, index) => {
                // A cabeça é de uma cor diferente
                ctx.fillStyle = index === 0 ? "#2ecc71" : "#27ae60";
                
                // O desenho leva em conta o scale (tamanho visual da minhoca)
                const size = gridSize * scale;
                const offset = (gridSize - size) / 2;

                ctx.fillRect(
                    part.x * gridSize + offset, 
                    part.y * gridSize + offset, 
                    size, 
                    size
                );
            });
        }

        function advanceSnake() {
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};
            
            // Só começa a mover se o jogador pressionar uma tecla
            if (dx === 0 && dy === 0) return;

            snake.unshift(head);

            const didEatBomb = snake[0].x === bomb.x && snake[0].y === bomb.y;
            if (didEatBomb) {
                score++;
                scale += 0.01; // Fica 1% maior visualmente
                updateScore();
                createBomb();
            } else {
                snake.pop();
            }
        }

        function didGameEnd() {
            if (dx === 0 && dy === 0) return false;

            const hitLeftWall = snake[0].x < 0;
            const hitRightWall = snake[0].x > tileCount - 1;
            const hitTopWall = snake[0].y < 0;
            const hitBottomWall = snake[0].y > tileCount - 1;

            let hitSelf = false;
            for (let i = 4; i < snake.length; i++) {
                if (snake[i].x === snake[0].x && snake[i].y === snake[0].y) hitSelf = true;
            }

            return hitLeftWall || hitRightWall || hitTopWall || hitBottomWall || hitSelf;
        }

        function createBomb() {
            bomb.x = Math.floor(Math.random() * tileCount);
            bomb.y = Math.floor(Math.random() * tileCount);
            
            // Garantir que a bomba não apareça em cima da minhoca
            snake.forEach(function(part) {
                if (part.x == bomb.x && part.y == bomb.y) createBomb();
            });
        }

        function drawBomb() {
            ctx.font = "16px serif";
            ctx.fillText("💣", bomb.x * gridSize + 2, bomb.y * gridSize + 15);
        }

        function changeDirection(event) {
            const keyPressed = event.keyCode;
            const UP = 38;
            const DOWN = 40;
            const LEFT = 37;
            const RIGHT = 39;

            const goingUp = dy === -1;
            const goingDown = dy === 1;
            const goingRight = dx === 1;
            const goingLeft = dx === -1;

            if (keyPressed === LEFT && !goingRight) { dx = -1; dy = 0; }
            if (keyPressed === UP && !goingDown) { dx = 0; dy = -1; }
            if (keyPressed === RIGHT && !goingLeft) { dx = 1; dy = 0; }
            if (keyPressed === DOWN && !goingUp) { dx = 0; dy = 1; }
        }

        function updateScore() {
            scoreElement.innerHTML = `Bombas comidas: ${score} | Tamanho: ${Math.round(scale * 100)}%`;
        }

        main();
        createBomb();
    </script>
</body>
</html>
